font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Gruvbox Dark
background            #1c1c1c
foreground            #e8dcc4
selection_background  #c8a050
selection_foreground  #161210
cursor                #c8a050
cursor_text_color     #161210

color0   #1c1c1c
color1   #c06040
color2   #8a9a60
color3   #c8a050
color4   #7ab0c8
color5   #a07898
color6   #70a898
color7   #9a8870

color8   #3a3028
color9   #d07050
color10  #a0b870
color11  #d4b060
color12  #8ac0d8
color13  #b088a8
color14  #80b8a8
color15  #e8dcc4

# Window
window_padding_width     12
confirm_os_window_close  0
background_opacity       0.95

# Tabs (clean)
tab_bar_style            powerline
tab_powerline_style      slanted
active_tab_background    #c8a050
active_tab_foreground    #161210
inactive_tab_background  #221c15
inactive_tab_foreground  #9a8870

# Misc
enable_audio_bell        no
copy_on_select           yes
scrollback_lines         5000
