backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 8;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.4;
shadow-color = "#1c1c1c";
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 4;

# Rounded corners
corner-radius = 8;
rounded-corners-exclude = [
  "class_g = 'Polybar'"
];

# Transparency
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "90:class_g = 'kitty' && !focused",
  "100:class_g = 'kitty' && focused"
];

# GLX
use-damage = true;
