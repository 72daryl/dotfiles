[colors]
bg       = #161210
bg-alt   = #221c15
fg       = #e8dcc4
fg-dim   = #9a8870
accent   = #c8a050
blue     = #7ab0c8
red      = #c06040

[bar/main]
width            = 100%
height           = 28
offset-x         = 0
offset-y         = 0
radius           = 0

background       = ${colors.bg}
foreground       = ${colors.fg}

line-size        = 2
line-color       = ${colors.accent}

border-size      = 0
padding-left     = 1
padding-right    = 2
module-margin    = 1

font-0           = monospace:size=9:weight=bold;2
font-1           = monospace:size=8;2

modules-left     = bspwm
modules-center   = date
modules-right    = pulseaudio sep cpu memory

separator        =
dim-value        = 1.0

wm-restack       = bspwm
cursor-click     = pointer

[module/bspwm]
type              = internal/bspwm
label-focused     = %name%
label-focused-foreground = ${colors.bg}
label-focused-background = ${colors.accent}
label-focused-padding    = 1

label-occupied     = %name%
label-occupied-foreground = ${colors.fg-dim}
label-occupied-padding    = 1

label-urgent       = %name%
label-urgent-foreground   = ${colors.bg}
label-urgent-background   = ${colors.red}

label-urgent-padding      = 1

label-empty        = %name%
label-empty-foreground    = #3a3028
label-empty-padding       = 1

[module/date]
type             = internal/date
interval         = 5
date             = %a %d %b
time             = %H:%M
label            = %date%  %time%
label-foreground = ${colors.fg}

[module/pulseaudio]
type             = internal/pulseaudio
format-volume    = VOL <label-volume>
label-volume     = %percentage%%
label-volume-foreground = ${colors.fg}
label-muted      = MUTE
label-muted-foreground  = ${colors.fg-dim}

[module/cpu]
type             = internal/cpu
interval         = 2
format           = CPU <label>
label            = %percentage%%
label-foreground = ${colors.fg}

[module/memory]
type             = internal/memory
interval         = 2
format           = MEM <label>
label            = %percentage_used%%
label-foreground = ${colors.fg}

[module/sep]
type             = custom/text
content          = |
content-foreground = #3a3028
